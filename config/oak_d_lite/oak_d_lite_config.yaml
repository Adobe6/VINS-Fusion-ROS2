%YAML:1.0

imu: 1
num_of_cam: 2

imu_topic: "/imu"
image0_topic: "/cam0/image_raw"
image1_topic: "/cam1/image_raw"
output_path: "~/.ros/output/"

cam0_calib: "cam0_pinhole.yaml"
cam1_calib: "cam1_pinhole.yaml"
image_width: 640
image_height: 480

use_gpu         : 0
use_gpu_acc_flow: 0
use_gpu_ceres   : 0

estimate_extrinsic: 1   # 在线优化外参，补偿工厂标定误差
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [0.999990820884705, -0.002999281045049, -0.003061933442950, 0.609297275543213, -0.003003920661286, -0.999994397163391, -0.001511717215180, 0.667593896389008, -0.003057382069528, 0.001520900987089, -0.999994158744812, 0.016251981258392, 0.000000000000000, 0.000000000000000, 0.000000000000000, 1.000000000000000]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [0.999908387660980, -0.002437161281705, -0.013313833624125, -6.909663200378418, -0.002330639399588, -0.999965190887451, 0.008010513149202, 0.662670373916626, -0.013332893140614, -0.007978749461472, -0.999879300594330, 0.106847986578941, 0.000000000000000, 0.000000000000000, 0.000000000000000, 1.000000000000000]

multiple_thread: 1

max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 1
flow_back: 1

max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

acc_n: 0.08
gyr_n: 0.004
acc_w: 0.001
gyr_w: 0.0001
g_norm: 9.805

estimate_td: 1                      # 在线估计相机与IMU的时间偏移
td: 0.0

load_previous_pose_graph: 0
pose_graph_save_path: "~/.ros/output/pose_graph/"
save_image: 1
